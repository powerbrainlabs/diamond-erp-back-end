name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          BUILD_ID=$(gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/diamond-erp-backend \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --async \
            --format="value(id)")
          echo "Build ID: $BUILD_ID"
          # Wait for build to complete
          gcloud builds log --stream $BUILD_ID --project ${{ secrets.GCP_PROJECT_ID }} || \
          gcloud builds wait $BUILD_ID --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy diamond-erp-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/diamond-erp-backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
