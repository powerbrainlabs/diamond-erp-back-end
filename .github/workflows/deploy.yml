name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            cd /home/ec2-user/app

            # Pull latest code (hard reset to avoid local-change conflicts)
            git fetch origin main
            git reset --hard origin/main

            # Ensure Poppins system font is installed (needed for Playwright PDF rendering)
            if ! fc-list | grep -q Poppins; then
              mkdir -p /home/ec2-user/.local/share/fonts/poppins
              curl -sLo /home/ec2-user/.local/share/fonts/poppins/Poppins-Regular.ttf 'https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Regular.ttf'
              curl -sLo /home/ec2-user/.local/share/fonts/poppins/Poppins-Medium.ttf 'https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Medium.ttf'
              curl -sLo /home/ec2-user/.local/share/fonts/poppins/Poppins-SemiBold.ttf 'https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-SemiBold.ttf'
              curl -sLo /home/ec2-user/.local/share/fonts/poppins/Poppins-Bold.ttf 'https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf'
              fc-cache -f /home/ec2-user/.local/share/fonts/
            fi

            # Install any new dependencies (use python3.11)
            python3.11 -m pip install -r requirements.txt --quiet --user

            # Restart the service
            sudo systemctl restart diamond-erp

            # Wait and verify it's running
            sleep 5
            sudo systemctl is-active diamond-erp
